<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kategoriler</title>
<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  scrollbar-width: none;
}
*::-webkit-scrollbar { display: none }
html, body {
  overflow: hidden; position: fixed;
  width: 100%; height: 100%;
  background: #000;
  font-family: -apple-system, 'SF Pro Rounded', 'SF Pro Display', BlinkMacSystemFont, sans-serif;
  overscroll-behavior: none;
}
input::placeholder { color: rgba(255,255,255,.3) }
#root { position: fixed; inset: 0 }
.fab-add{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:10;
  width:56px;height:56px;border-radius:28px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .2s cubic-bezier(.32,.72,0,1),opacity .2s;
}
.fab-add:active{transform:translateX(-50%) scale(.9)}
.card-fill{
  position:absolute;top:0;left:0;bottom:0;border-radius:20px;
  pointer-events:none;z-index:0;
  transition:width .5s cubic-bezier(.25,1,.5,1);
}
.check-done{
  border-color:rgba(16,185,129,.5) !important;
  background:rgba(16,185,129,.2) !important;
}
</style>
</head>
<body>
<div id="root">
  <div id="appContainer" style="position:fixed;top:0;left:0;right:0;height:100%;background:#000;overflow:hidden;touch-action:none;font-family:-apple-system,'SF Pro Rounded','SF Pro Display',BlinkMacSystemFont,sans-serif">
    <div id="contentBlock" style="position:absolute;left:0;right:0;top:130px;will-change:opacity,transform">
      <div style="padding:0 20px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <h1 id="viewTitle" style="font-size:26px;font-weight:700;color:#fff;margin:0;letter-spacing:-.025em">Kategoriler</h1>
          <p id="subtitle" style="font-size:13.5px;color:rgba(255,255,255,.35);margin:3px 0 0;font-weight:500">← sola çek veya + ile ekle</p>
        </div>
      </div>
      <div id="rowContainer" style="position:relative">
        <div id="row1Wrap" style="position:absolute;left:0;right:0;bottom:100%;overflow:hidden;height:0;opacity:0;pointer-events:none">
          <div style="overflow:hidden;padding:6px 0">
            <div id="row1Track" style="display:flex;padding:0 0 0 15px;gap:9px;will-change:transform"></div>
          </div>
        </div>
        <div id="row2Wrap" style="position:relative;padding:10px 0">
          <div id="pullIndicator" style="position:absolute;left:20px;top:50%;margin-top:-24px;z-index:0;width:48px;height:48px;border-radius:14px;border:2px dashed rgba(255,255,255,.15);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;opacity:0;transform:translateX(-56px) scale(.3);transition:border-color .15s,background .15s;pointer-events:none">
            <div class="pull-icon" style="color:rgba(255,255,255,.5);display:flex;transition:color .15s">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
          </div>
          <div id="row2Scroll" style="overflow-x:auto;overflow-y:hidden;position:relative;z-index:1;user-select:none;-webkit-user-select:none">
            <div id="row2Track" style="display:flex;padding:0 0 0 20px"></div>
          </div>
        </div>
        <div id="row3Wrap" style="position:absolute;left:0;right:0;top:100%;overflow:hidden;height:0;opacity:0;pointer-events:none">
          <div style="overflow:hidden;padding:6px 0">
            <div id="row3Track" style="display:flex;padding:0 0 0 15px;gap:9px;will-change:transform"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <button class="fab-add" id="addBtn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<script>
(function(){

    {bg:"#CA8A04",accent:"#FDE047"},
    {bg:"#10B981",accent:"#6EE7B7"},

    {bg:"#6366F1",accent:"#A5B4FC"},
    {bg:"#EA580C",accent:"#FDBA74"},
  ],
  W:168, H:124, R:20, GAP:12,
  get SLOT(){return this.W+this.GAP;},
  PULL_THRESHOLD:68,
  PULL_MAX:90,
  AXIS_THRESHOLD:4,
  AXIS_RATIO:1.5,
  MOMENTUM_FRICTION:0.985,
  MOMENTUM_MIN:0.5,
  SCRATCHES:[
    [15,8,185,132,2.8],[35,3,195,118,2],[8,35,165,137,2.4],
    [55,0,198,95,1.6],[3,60,145,138,2.2],[75,2,197,78,1.4]
  ],
  CONTENT_HEIGHT:190,
  BLUR_SUBMIT_DELAY:250,
  EDIT_BLUR_DELAY:150,
  FADE_DURATION:300,
  BLANK_FADE_DELAY:320,

  pickColor:function(usedBgs){
    var available=this.COLORS.filter(function(c){return usedBgs.indexOf(c.bg)===-1;});
    var pool=available.length?available:this.COLORS;
    return pool[Math.floor(Math.random()*pool.length)];
  }

      {id:1,text:"Rapor hazırla",color:Config.COLORS[2]},
      {id:2,text:"Toplantı notları",color:Config.COLORS[3]},

      {id:4,text:"Sunum dosyası",color:Config.COLORS[5]},
      {id:5,text:"Bütçe revizyonu",color:Config.COLORS[6]},
      {id:6,text:"Müşteri araması",color:Config.COLORS[7]},
      {id:7,text:"Haftalık özet",color:Config.COLORS[1]},

      {id:9,text:"Staj başvuruları",color:Config.COLORS[3]},
    ],nextTodoId:10},
    {id:2,text:"Kişisel",color:Config.COLORS[1],todos:[
      {id:1,text:"Market alışverişi",color:Config.COLORS[5]},
      {id:2,text:"Spor salonu",color:Config.COLORS[6]},
      {id:3,text:"Diş randevusu",color:Config.COLORS[0]},
      {id:4,text:"Fatura öde",color:Config.COLORS[2]},
      {id:5,text:"Kuru temizleme",color:Config.COLORS[7]},
      {id:6,text:"Araba yıka",color:Config.COLORS[4]},
      {id:7,text:"Kitap bitir",color:Config.COLORS[3]},
      {id:8,text:"Doğum günü hediyesi",color:Config.COLORS[1]},
      {id:9,text:"Vitamin al",color:Config.COLORS[6]},
    ],nextTodoId:10},
    {id:3,text:"Projeler",color:Config.COLORS[4],todos:[

      {id:2,text:"API entegrasyonu",color:Config.COLORS[7]},

      {id:5,text:"Unit testler",color:Config.COLORS[5]},
      {id:6,text:"CI/CD pipeline",color:Config.COLORS[2]},

    ],nextTodoId:10},
  ],
  nextCategoryId:5,
  adding:false,

  /** Returns the currently visible list (categories array or current category's todos) */
  activeList:function(){
    return this.view==="categories"?this.categories
      :(this.currentCategory?this.currentCategory.todos:[]);
  },
  /** Generates and returns the next unique ID for the active list */
  activeNextId:function(){
    if(this.view==="categories")return this.nextCategoryId++;
    return this.currentCategory.nextTodoId++;
  }
};


/* ═══════════════════════════════════════════
   DOM — Cached element references
   ═══════════════════════════════════════════ */
var DOM={
  appContainer:  document.getElementById("appContainer"),
  contentBlock:  document.getElementById("contentBlock"),
  rowContainer:  document.getElementById("rowContainer"),
  row1Wrap:      document.getElementById("row1Wrap"),
  row1Track:     document.getElementById("row1Track"),
  row2Wrap:      document.getElementById("row2Wrap"),
  row2Scroll:    document.getElementById("row2Scroll"),
  row2Track:     document.getElementById("row2Track"),
  row3Wrap:      document.getElementById("row3Wrap"),
  row3Track:     document.getElementById("row3Track"),
  subtitle:      document.getElementById("subtitle"),
  addBtn:        document.getElementById("addBtn"),
  pullIndicator: document.getElementById("pullIndicator"),
  viewTitle:     document.getElementById("viewTitle"),
  proxyInput:    null, // Layout.init içinde oluşturulacak

  queryNewCard:function(){return this.row2Track.querySelector(".new-card");}
};


/* ═══════════════════════════════════════════
   LAYOUT — Viewport stabilization, keyboard handling
   ═══════════════════════════════════════════ */
var Layout=(function(){
  var initialHeight=window.innerHeight;
  var fixedTop;

  function init(){
    var measurer=document.createElement("div");
    measurer.style.cssText="position:fixed;top:0;height:100svh;pointer-events:none;visibility:hidden";
    document.body.appendChild(measurer);
    var svh=measurer.offsetHeight||initialHeight;
    document.body.removeChild(measurer);

    DOM.appContainer.style.height=initialHeight+"px";
    fixedTop=Math.max(40,Math.round(svh*0.38-Config.CONTENT_HEIGHT/2));
    DOM.contentBlock.style.top=fixedTop+"px";
    RowManager.position(fixedTop);

    // Proxy input: klavye açılması için user gesture zincirinde senkron focus
    var proxy=document.createElement("input");
    proxy.type="text";proxy.inputMode="text";
    proxy.setAttribute("aria-hidden","true");
    proxy.tabIndex=-1;
    Object.assign(proxy.style,{
      position:"fixed",top:"-9999px",left:"-9999px",opacity:"0",
      width:"1px",height:"1px",border:"none",padding:"0",margin:"0",pointerEvents:"none"
    });
    document.body.appendChild(proxy);
    DOM.proxyInput=proxy;

    bindViewportEvents();
  }

  function positionContent(){
    if(State.adding)return; /* klavye açılırken content sabit kalsın */
    var visibleH=window.visualViewport?window.visualViewport.height:initialHeight;
    var contentBottom=fixedTop+Config.CONTENT_HEIGHT;
    var top=(contentBottom>visibleH-24)?Math.max(20,visibleH-24-Config.CONTENT_HEIGHT):fixedTop;
    DOM.contentBlock.style.transition="top .28s cubic-bezier(.25,1,.5,1)";
    DOM.contentBlock.style.top=top+"px";
  }

  function compensateScroll(){
    if(window.visualViewport){
      DOM.appContainer.style.transform="translateY("+window.visualViewport.offsetTop+"px)";
    }
    window.scrollTo(0,0);
    document.documentElement.scrollTop=0;
    document.body.scrollTop=0;
  }

  function bindViewportEvents(){
    if(window.visualViewport){
      window.visualViewport.addEventListener("resize",function(){
        DOM.appContainer.style.height=initialHeight+"px";
        positionContent();
        compensateScroll();
      });
      window.visualViewport.addEventListener("scroll",compensateScroll);
    }
    window.addEventListener("scroll",function(){
      window.scrollTo(0,0);
      compensateScroll();
    },{passive:false});
  }

  return {init:init};
})();


/* ═══════════════════════════════════════════
   CARD FACTORY — Card DOM element creation and promotion
   ═══════════════════════════════════════════ */
var CardFactory=(function(){

  function scratches(accent){
    var ns="http://www.w3.org/2000/svg";
    var svg=document.createElementNS(ns,"svg");
    Object.assign(svg.style,{position:"absolute",inset:"0",width:"100%",height:"100%",opacity:"0.12",pointerEvents:"none"});
    svg.setAttribute("viewBox","0 0 200 140");
    svg.setAttribute("preserveAspectRatio","none");
    Config.SCRATCHES.forEach(function(s){
      var line=document.createElementNS(ns,"line");
      line.setAttribute("x1",s[0]);line.setAttribute("y1",s[1]);
      line.setAttribute("x2",s[2]);line.setAttribute("y2",s[3]);
      line.setAttribute("stroke",accent);line.setAttribute("stroke-width",s[4]);
      line.setAttribute("stroke-linecap","round");
      svg.appendChild(line);
    });
    return svg;
  }

  var ACTION_BTN_STYLE={
    width:"26px",height:"26px",borderRadius:"50%",border:"2px solid rgba(255,255,255,.28)",
    background:"rgba(255,255,255,.08)",display:"flex",alignItems:"center",justifyContent:"center",
    cursor:"pointer",padding:"0",transition:"background .15s,border-color .15s",
  };

  function actionButton(svgHTML,onClick){
    var btn=document.createElement("button");
    Object.assign(btn.style,ACTION_BTN_STYLE);
    btn.innerHTML=svgHTML;
    btn.addEventListener("click",function(e){e.stopPropagation();onClick();});
    return btn;
  }

  function checkButton(onClick){
    var btn=actionButton('<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',function(){
      btn.classList.add("check-done");
      btn.querySelector("svg").setAttribute("stroke","#6EE7B7");
      setTimeout(onClick,400);
    });
    return btn;
  }

  function editButton(onClick){
    return actionButton('<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>',onClick);
  }

  function textLabel(text,onEdit){
    var div=document.createElement("div");
    Object.assign(div.style,{
      fontWeight:"600",fontSize:"15.5px",color:"#fff",lineHeight:"1.22",letterSpacing:"-.01em",
      display:"-webkit-box",WebkitLineClamp:"2",WebkitBoxOrient:"vertical",
      overflow:"hidden",textOverflow:"ellipsis",wordBreak:"break-all",cursor:onEdit?"text":"default",
    });
    div.textContent=text;
    if(onEdit){div.addEventListener("click",function(e){e.stopPropagation();onEdit(div);});}
    return div;
  }

  function contentContainer(justify){
    var div=document.createElement("div");
    div.className="card-content";
    Object.assign(div.style,{
      position:"relative",zIndex:"1",padding:"12px 14px",height:"100%",
      display:"flex",flexDirection:"column",justifyContent:justify||"space-between"
    });
    return div;
  }

  // Mevcut kart (task veya kategori)
  function existing(item,opts){
    opts=opts||{};
    var isCategory=!!opts.isCategory;
    var wrapper=document.createElement("div");
    wrapper.className="card-wrapper";
    Object.assign(wrapper.style,{width:Config.SLOT+"px",overflow:"hidden",flexShrink:"0"});

    var card=document.createElement("div");
    Object.assign(card.style,{
      width:Config.W+"px",height:Config.H+"px",borderRadius:Config.R+"px",marginRight:Config.GAP+"px",
      background:item.color.bg,position:"relative",overflow:"hidden",
    });
    var fillDiv=document.createElement("div");
    fillDiv.className="card-fill";
    fillDiv.style.background="linear-gradient(to right,"+item.color.accent+"1f,"+item.color.accent+"03)";
    fillDiv.style.width="0%";
    card.appendChild(fillDiv);
    card.appendChild(scratches(item.color.accent));

    var content=contentContainer("space-between");

    // Kategori: text tıklanamaz (click card'a bubbles → onTap), check button editing başlatır
    // Task: text tıklanınca editing, check button silme
    var txtDiv;
    if(isCategory){
      txtDiv=textLabel(item.text); // onEdit yok → click handler yok → bubbles to card
    }else{
      txtDiv=textLabel(item.text,function(div){Editing.start(content,div,item);});
    }

    var btnRow=document.createElement("div");
    Object.assign(btnRow.style,{display:"flex",justifyContent:"flex-end"});
    if(isCategory){
      btnRow.appendChild(editButton(function(){Editing.start(content,txtDiv,item,true);}));
    }else{
      btnRow.appendChild(checkButton(function(){if(opts.onCheck)opts.onCheck();}));
    }
    content.appendChild(btnRow);
    content.appendChild(txtDiv);

    card.appendChild(content);
    wrapper.appendChild(card);

    if(opts.onTap){
      card.addEventListener("click",function(e){
        if(!e.target.closest("button")&&!e.target.closest("input"))opts.onTap();
      });
    }

    return wrapper;
  }

  // Yeni task kartı (input modunda)
  function blank(color,pullWidth){
    var startW=pullWidth?Math.min(pullWidth,Config.SLOT):0;

    var collapser=document.createElement("div");
    Object.assign(collapser.style,{
      width:startW+"px",overflow:"hidden",flexShrink:"0",
      transition:"width .32s cubic-bezier(.25,1,.5,1)",
    });
    collapser.className="new-card";

    var card=document.createElement("div");
    Object.assign(card.style,{
      width:Config.W+"px",height:Config.H+"px",borderRadius:Config.R+"px",marginRight:Config.GAP+"px",
      background:color.bg,position:"relative",overflow:"hidden",flexShrink:"0",
      opacity:"0",transform:"scale(.85) translateY(6px)",
    });
    card.appendChild(scratches(color.accent));

    var content=contentContainer("flex-end");

    var input=document.createElement("input");
    input.type="text";input.inputMode="text";input.enterKeyHint="done";
    input.autocomplete="off";input.spellcheck=false;
    input.placeholder=State.view==="categories"?"Kategori adı...":"Görev adı...";
    Object.assign(input.style,{
      fontWeight:"600",fontSize:"16px",color:"#fff",lineHeight:"1.22",letterSpacing:"-.01em",
      background:"transparent",border:"none",outline:"none",padding:"0",margin:"0",width:"100%",
      caretColor:"transparent",fontFamily:"inherit",
    });
    setTimeout(function(){input.style.caretColor="#fff";},620);

    var submitted=false;
    function submit(){
      if(submitted)return;submitted=true;
      var v=(input.value||"").trim();
      if(v){TodoManager.confirm(v,color);}
      else{TodoManager.cancel();}
    }
    // Input'a dışarıdan erişim (confirmAndContinue için)
    collapser._blankInput=input;
    collapser._blankColor=color;
    collapser._markSubmitted=function(){submitted=true;};
    input.addEventListener("keydown",function(e){
      if(e.key==="Enter"){e.preventDefault();submit();}
      if(e.key==="Escape"){submitted=true;TodoManager.cancel();}
    });
    input.addEventListener("blur",function(){setTimeout(submit,Config.BLUR_SUBMIT_DELAY);});

    content.appendChild(input);
    card.appendChild(content);
    collapser.appendChild(card);

    // Width genişleme
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        collapser.style.width=Config.SLOT+"px";
      });
    });

    // Fade-in: pull'dan geliyorsa erken, + butonundan geliyorsa geç
    var fadeDelay=pullWidth?100:Config.BLANK_FADE_DELAY;
    setTimeout(function(){
      card.style.transition="opacity .3s ease, transform .3s cubic-bezier(.4,0,.2,1)";
      card.style.opacity="1";
      card.style.transform="scale(1) translateY(0)";
    },fadeDelay);

    // Focus transfer
    requestAnimationFrame(function(){
      input.focus({preventScroll:true});
      window.scrollTo(0,0);
    });

    return collapser;
  }

  // Yeni kartı mevcut karta dönüştür (yerinde — DOM'dan kaldırıp tekrar oluşturmaz)
  function promote(nc,item,opts){
    opts=opts||{};
    var isCategory=!!opts.isCategory;
    nc.className="card-wrapper";
    var card=nc.firstElementChild;
    var content=card.querySelector(".card-content");
    if(!content)return;

    // Input'u kaldır
    var input=content.querySelector("input");
    if(input)content.removeChild(input);

    content.style.justifyContent="space-between";

    // Text label
    var txtDiv;
    if(isCategory){
      txtDiv=textLabel(item.text);
    }else{
      txtDiv=textLabel(item.text,function(div){Editing.start(content,div,item);});
    }

    // Check button
    var btnRow=document.createElement("div");
    Object.assign(btnRow.style,{display:"flex",justifyContent:"flex-end"});
    if(isCategory){
      btnRow.appendChild(editButton(function(){Editing.start(content,txtDiv,item,true);}));
    }else{
      btnRow.appendChild(checkButton(function(){if(opts.onCheck)opts.onCheck();}));
    }
    content.insertBefore(btnRow,content.firstChild);
    content.appendChild(txtDiv);

    // Kart gövdesi tıklama (kategori navigasyonu için)
    if(opts.onTap){
      card.addEventListener("click",function(e){
        if(!e.target.closest("button")&&!e.target.closest("input"))opts.onTap();
      });
    }
  }

  function updateFills(){
    var wrappers=DOM.row2Track.querySelectorAll(".card-wrapper");
    var total=wrappers.length;
    for(var i=0;i<total;i++){
      var fill=wrappers[i].querySelector(".card-fill");
      if(fill)fill.style.width=Math.round((1-i/Math.max(total,1))*100)+"%";
    }
  }

  return {existing:existing, blank:blank, promote:promote, textLabel:textLabel, updateFills:updateFills};
})();


/* ═══════════════════════════════════════════
   ANIMATIONS — Card remove/collapse animations
   ═══════════════════════════════════════════ */
var Animations=(function(){

  // Ortak fade-out: double-rAF ile opacity+scale animasyonu, bitince onDone çağır
  function fadeOut(el,onDone){
    el.style.transition="opacity .3s ease, transform .3s cubic-bezier(.4,0,.2,1)";
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        el.style.opacity="0";
        el.style.transform="scale(.85) translateY(-6px)";
      });
    });
    if(onDone)setTimeout(onDone,Config.FADE_DURATION);
  }

  // Ortak width collapse: width→0, transitionend'de onDone çağır
  function collapseWidth(el,onDone){
    el.style.transition="width .32s cubic-bezier(.4,0,.2,1)";
    el.style.width="0px";
    el.addEventListener("transitionend",function handler(e){
      if(e.propertyName==="width"){
        el.removeEventListener("transitionend",handler);
        onDone();
      }
    });
  }

  return {
    // Kart silme: fade-out → width collapse → DOM kaldır
    remove:function(wrapper,card,id){
      fadeOut(card,function(){
        wrapper.style.borderRadius=Config.R+"px";
        collapseWidth(wrapper,function(){
          var list=State.activeList();
          for(var i=0;i<list.length;i++){
            if(list[i].id===id){list.splice(i,1);break;}
          }
          wrapper.remove();
          CardFactory.updateFills();
          UI.updateSubtitle();
          if(list.length===0&&!State.adding)UI.showEmptyState();
        });
      });
    },

    // Yeni kart iptali: fade-out → width collapse → DOM kaldır
    collapse:function(nc){
      var card=nc.firstElementChild;
      fadeOut(card,function(){
        collapseWidth(nc,function(){
          nc.remove();
          UI.updateSubtitle();
          var list=State.activeList();
          if(list.length===0&&!State.adding)UI.showEmptyState();
        });
      });
    }
  };
})();


/* ═══════════════════════════════════════════
   EDITING — Inline text editing for cards
   ═══════════════════════════════════════════ */
var Editing={
  start:function(content,textDiv,todo,categoryMode){
    var input=document.createElement("input");
    input.type="text";input.inputMode="text";input.enterKeyHint="done";
    input.autocomplete="off";input.value=todo.text;
    Object.assign(input.style,{
      fontWeight:"600",fontSize:"16px",color:"#fff",lineHeight:"1.22",letterSpacing:"-.01em",
      background:"rgba(0,0,0,.15)",border:"none",borderRadius:"6px",outline:"none",
      padding:"2px 4px",margin:"-2px -4px",width:"calc(100% + 8px)",caretColor:"#fff",fontFamily:"inherit",
    });

    var committed=false;
    function commit(){
      if(committed)return;committed=true;
      var v=(input.value||"").trim();
      if(v&&v!==todo.text){
        todo.text=v;
        // Kategori adı değiştiyse ve aktifse header'ı güncelle
        if(categoryMode&&State.currentCategory===todo){
          DOM.viewTitle.textContent=todo.text;
        }
      }
      var label;
      if(categoryMode){
        // Kategori: text tıklanamaz, click bubbles to card
        label=CardFactory.textLabel(todo.text);
      }else{
        label=CardFactory.textLabel(todo.text,function(div){
          Editing.start(content,div,todo);
        });
      }
      content.replaceChild(label,input);
    }

    input.addEventListener("keydown",function(e){
      if(e.key==="Enter"){e.preventDefault();commit();}
      if(e.key==="Escape"){committed=true;content.replaceChild(textDiv,input);}
    });
    input.addEventListener("blur",function(){setTimeout(commit,Config.EDIT_BLUR_DELAY);});

    content.replaceChild(input,textDiv);
    input.focus({preventScroll:true});
    input.setSelectionRange(0,input.value.length);
    window.scrollTo(0,0);
  }
};


/* ═══════════════════════════════════════════

   ═══════════════════════════════════════════ */

    return s;
  }

  return {
    showEmptyState:function(){
      var existing=DOM.row2Track.querySelector(".empty-state");
      if(existing)existing.remove();

      var empty=document.createElement("div");
      empty.className="empty-state";
      Object.assign(empty.style,{
        width:Config.W+"px",height:Config.H+"px",borderRadius:Config.R+"px",flexShrink:"0",
        border:"2px dashed rgba(255,255,255,.08)",display:"flex",alignItems:"center",
        justifyContent:"center",flexDirection:"column",gap:"6px",
      });
      empty.innerHTML='<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:12px;color:rgba(255,255,255,.15);font-weight:600">Harika!</span>';
      DOM.row2Track.appendChild(empty);
      DOM.row2Track.appendChild(spacer());
    },

      var el=DOM.row2Track.querySelector(".empty-state");
      if(el)el.remove();

})();


/* ═══════════════════════════════════════════
   ROW MANAGER — 3-satır layout: pasif satırlar + aktif satır
   ═══════════════════════════════════════════ */
var RowManager=(function(){
  var SCALE=0.75;
  var PARALLAX=0.75;
  var ROW_GAP=16;
  var PASSIVE_OPACITY=0.5;
  var MASK_UP="linear-gradient(to top, rgba(0,0,0,0.3) 10%, transparent 85%)";
  var MASK_DOWN="linear-gradient(to bottom, rgba(0,0,0,0.25) 10%, transparent 85%)";
  var PASSIVE_ROW_H=Math.round(Config.H*SCALE)+12; // kart + padding

  function miniCard(item){
    var c=document.createElement("div");
    Object.assign(c.style,{
      width:Math.round(Config.W*SCALE)+"px",
      height:Math.round(Config.H*SCALE)+"px",
      borderRadius:Math.round(Config.R*SCALE)+"px",
      background:item.color.bg,flexShrink:"0"
    });
    return c;
  }

  function placeholderCard(onTap){
    var c=document.createElement("div");
    Object.assign(c.style,{
      width:Math.round(Config.W*SCALE)+"px",
      height:Math.round(Config.H*SCALE)+"px",
      borderRadius:Math.round(Config.R*SCALE)+"px",
      border:"2px dashed rgba(255,255,255,.08)",flexShrink:"0",
      display:"flex",alignItems:"center",justifyContent:"center",
      cursor:onTap?"pointer":"default",
      pointerEvents:onTap?"auto":"none"
    });
    c.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
    if(onTap)c.addEventListener("click",onTap);
    return c;
  }

  function miniSpacer(){
    var s=document.createElement("div");
    Object.assign(s.style,{width:Math.round(40*SCALE)+"px",flexShrink:"0"});
    return s;
  }

  function fillPassiveRow(track,list){
    track.innerHTML="";
    list.forEach(function(item){track.appendChild(miniCard(item));});
    track.appendChild(miniSpacer());
  }

  function stylePassive(wrap,direction){
    wrap.style.opacity=String(PASSIVE_OPACITY);
    var mask=direction==="up"?MASK_UP:MASK_DOWN;
    wrap.style.maskImage=mask;
    wrap.style.webkitMaskImage=mask;
    wrap.style.filter="blur(0.5px)";
    wrap.style.pointerEvents="none";
    wrap.style.height=PASSIVE_ROW_H+"px";
    wrap.style.overflow="hidden";
    // Row 1: bottom:100% + margin-bottom ile row2'nin üstünde
    // Row 3: top:100% + margin-top ile row2'nin altında
    if(direction==="up"){
      wrap.style.marginBottom=ROW_GAP+"px";
    }else{
      wrap.style.marginTop=ROW_GAP+"px";
    }
  }

  function hideRow(wrap){
    wrap.style.height="0";
    wrap.style.opacity="0";
    wrap.style.overflow="hidden";
    wrap.style.marginBottom="0";
    wrap.style.marginTop="0";
    wrap.style.pointerEvents="none";
    wrap.style.maskImage="none";
    wrap.style.webkitMaskImage="none";
    wrap.style.filter="none";
    // Track'i temizle ama DOM yapısını koru
    var track=wrap===DOM.row1Wrap?DOM.row1Track:DOM.row3Track;
    track.innerHTML="";
    track.style.transform="";
  }

  function spacer(){
    var s=document.createElement("div");
    Object.assign(s.style,{width:"40px",flexShrink:"0"});
    return s;
  }

  function renderActiveRow(){
    DOM.row2Track.innerHTML="";
    DOM.row2Scroll.scrollLeft=0;
    var list=State.activeList();
    if(list.length===0&&!State.adding){
      UI.showEmptyState();
    }else{
      list.forEach(function(item){
        var el;
        if(State.view==="categories"){
          el=CardFactory.existing(item,{
            isCategory:true,
            onTap:function(){Navigation.goToTasks(item);}
          });
        }else{
          el=CardFactory.existing(item,{
            onCheck:function(){Animations.remove(el,el.firstElementChild,item.id);}
          });
        }
        DOM.row2Track.appendChild(el);
      });
      DOM.row2Track.appendChild(spacer());
      CardFactory.updateFills();
    }
  }

  function populate(){
    if(State.view==="categories"){
      // Row 1: gizli
      hideRow(DOM.row1Wrap);

      // Row 2: kategoriler (aktif)
      renderActiveRow();

      // Row 3: ilk kategorinin taskleri veya placeholder
      var previewCat=State.lastCategory||State.categories[0];
      if(previewCat&&previewCat.todos.length>0){
        fillPassiveRow(DOM.row3Track,previewCat.todos);
      }else{
        DOM.row3Track.innerHTML="";
        DOM.row3Track.appendChild(placeholderCard(function(){
          var cat=previewCat||State.categories[0];
          if(cat)Navigation.goToTasks(cat);
        }));
      }
      stylePassive(DOM.row3Wrap,"down");
    }else{
      // Row 1: kategoriler
      fillPassiveRow(DOM.row1Track,State.categories);
      stylePassive(DOM.row1Wrap,"up");

      // Row 2: taskler (aktif)
      renderActiveRow();

      // Row 3: placeholder
      DOM.row3Track.innerHTML="";
      DOM.row3Track.appendChild(placeholderCard(function(){
        Navigation.goToCategories();
      }));
      stylePassive(DOM.row3Wrap,"down");
    }
    syncScroll(DOM.row2Scroll.scrollLeft);
  }

  function syncScroll(row2Left){
    var target1=row2Left*PARALLAX;
    var target3=row2Left*PARALLAX;

    // Boundary deceleration: Row 1
    var parent1=DOM.row1Track.parentElement;
    if(parent1){
      var max1=DOM.row1Track.scrollWidth-parent1.clientWidth;
      if(max1>0&&target1>max1){
        var over=target1-max1;
        target1=max1+over*0.15;
      }
    }

    // Boundary deceleration: Row 3
    var parent3=DOM.row3Track.parentElement;
    if(parent3){
      var max3=DOM.row3Track.scrollWidth-parent3.clientWidth;
      if(max3>0&&target3>max3){
        var over=target3-max3;
        target3=max3+over*0.15;
      }
    }

    DOM.row1Track.style.transform="translateX("+(-target1)+"px)";
    DOM.row3Track.style.transform="translateX("+(-target3)+"px)";
  }

  function bounce(overscrollPx){
    var dur=580;
    var ease="cubic-bezier(.25,1.05,.5,.98)";
    var p=PARALLAX;
    [DOM.row1Track,DOM.row3Track].forEach(function(track){
      if(!track||!track.firstChild)return;
      var cur=track.style.transform;
      var base=0;
      if(cur){var m=cur.match(/translateX\(([-\d.]+)px\)/);if(m)base=parseFloat(m[1]);}
      track.animate([
        {transform:"translateX("+(base+overscrollPx*p)+"px)"},
        {transform:"translateX("+base+"px)"}
      ],{duration:dur,easing:ease,fill:"none"});
    });
  }

  function position(fixedTop){
    // Satırlar contentBlock içinde doğal akışta — özel konumlandırma gerekmez
  }

  return {
    populate:populate,
    syncScroll:syncScroll,
    bounce:bounce,
    position:position,
    renderActiveRow:renderActiveRow,
    SCALE:SCALE,
    PASSIVE_ROW_H:PASSIVE_ROW_H,
    ROW_GAP:ROW_GAP
  };
})();


/* ═══════════════════════════════════════════
   TODO MANAGER — Add, confirm, cancel, consecutive adding
   ═══════════════════════════════════════════ */
var TodoManager={
  /** Start adding a new item. Creates a blank card with input.
   *  @param {number} [pullWidth] - Initial width from pull gesture (px) */
  add:function(pullWidth){
    if(State.addingLock)return;
    DOM.proxyInput.focus({preventScroll:true});
    State.addingLock=true;
    State.adding=true;
    var list=State.activeList();
    var color=Config.pickColor(list.map(function(t){return t.color.bg;}));

    UI.removeEmptyState();
    DOM.row2Scroll.scrollLeft=0;RowManager.syncScroll(0);

    var el=CardFactory.blank(color,pullWidth);
    DOM.row2Track.insertBefore(el,DOM.row2Track.firstChild);
    UI.updateSubtitle();
  },

  /** Confirm blank card as permanent item. Promotes in-place (no DOM rebuild).
   *  @param {string} text - Item text
   *  @param {{bg:string,accent:string}} color - Color pair */
  confirm:function(text,color){
    var item={id:State.activeNextId(),text:text,color:color};
    if(State.view==="categories"){item.todos=[];item.nextTodoId=1;}
    State.activeList().unshift(item);
    State.adding=false;State.addingLock=false;

    var nc=DOM.queryNewCard();
    if(nc){
      var opts;
      if(State.view==="categories"){
        opts={
          isCategory:true,
          onTap:function(){Navigation.goToTasks(item);}
        };
      }else{
        opts={
          onCheck:function(){Animations.remove(nc,nc.firstElementChild,item.id);}
        };
      }
      CardFactory.promote(nc,item,opts);
    }

    UI.removeEmptyState();
    UI.updateSubtitle();
    CardFactory.updateFills();
  },

  /** Confirm current item AND open new blank card (consecutive adding via pull).
   *  @param {number} [pullWidth] - Pull width for the new card
   *  @returns {boolean} true if confirmed, false if empty text (will be cancelled) */
  confirmAndContinue:function(pullWidth){
    var nc=DOM.queryNewCard();
    if(!nc||!nc._blankInput)return false;

    // HER DURUMDA blur handler'ı engelle (submitted=true)
    nc._markSubmitted();

    var text=(nc._blankInput.value||"").trim();
    if(!text) return false;

    this.confirm(text,nc._blankColor);
    this.add(pullWidth);
    return true;
  },

  /** Cancel adding: collapse blank card, reset state */
  cancel:function(){
    State.adding=false;State.addingLock=false;
    var nc=DOM.queryNewCard();
    var list=State.activeList();
    if(!nc){UI.updateSubtitle();if(list.length===0)UI.showEmptyState();return;}
    Animations.collapse(nc);
  }
};


/* ═══════════════════════════════════════════
   NAVIGATION — Category↔Task view transitions (3-satır kayma)
   ═══════════════════════════════════════════ */
var Navigation=(function(){
  var currentAnim=null;
  var transitioning=false;
  var EASE="cubic-bezier(.25,1,.5,1)";

  var swipeTargetCategory=null;
  var savedLastCategory=null;
  var savedCategoryScroll=0;
  var swipeCommitted=false;

  function cleanup(){
    if(currentAnim){
      currentAnim.forEach(function(a){try{a.cancel();}catch(e){}});
      currentAnim=null;
    }
    DOM.contentBlock.style.opacity="1";
    DOM.contentBlock.style.transform="none";
    transitioning=false;
    swipeCommitted=false;
  }

  function updateHeader(){
    DOM.viewTitle.textContent=State.view==="categories"?"Kategoriler"
      :(State.currentCategory?State.currentCategory.text:"");
  }

  function applyNewState(direction){
    if(direction==="up"){
      var cat=swipeTargetCategory||State.lastCategory;
      if(!cat)return;
      savedCategoryScroll=DOM.row2Scroll.scrollLeft;
      State.view="tasks";State.currentCategory=cat;State.lastCategory=cat;
    }else{
      State.view="categories";State.currentCategory=null;
    }
    updateHeader();
    UI.renderAll();
    if(direction==="down"){
      DOM.row2Scroll.scrollLeft=savedCategoryScroll;
      RowManager.syncScroll(savedCategoryScroll);
    }
  }

  function revertState(direction){
    if(direction==="up"){
      State.view="categories";State.currentCategory=null;
      if(savedLastCategory!==undefined)State.lastCategory=savedLastCategory;
    }else{
      State.view="tasks";State.currentCategory=State.lastCategory;
    }
    updateHeader();
    UI.renderAll();
    if(direction==="up"){
      DOM.row2Scroll.scrollLeft=savedCategoryScroll;
      RowManager.syncScroll(savedCategoryScroll);
    }
  }

  // ── Tap: fade-out → rebuild → fade-in (snapshot yok) ──
  function animateTransition(direction,cat){
    if(transitioning)return;
    cleanup();
    transitioning=true;
    swipeTargetCategory=cat||null;
    var sign=direction==="down"?1:-1;

    var fadeOut=DOM.contentBlock.animate([
      {opacity:1,transform:"translate3d(0,0,0)"},
      {opacity:0,transform:"translate3d(0,"+(sign*15)+"px,0)"}
    ],{duration:150,easing:EASE});

    currentAnim=[fadeOut];
    fadeOut.onfinish=function(){
      applyNewState(direction);
      var fadeIn=DOM.contentBlock.animate([
        {opacity:0,transform:"translate3d(0,"+(-sign*10)+"px,0)"},
        {opacity:1,transform:"translate3d(0,0,0)"}
      ],{duration:200,easing:EASE});
      currentAnim=[fadeIn];
      fadeIn.onfinish=function(){cleanup();};
    };
  }

  // ── Swipe: progress ile doğrudan opacity kontrol (snapshot yok) ──
  function startSwipe(direction,targetCategory){
    cleanup();
    transitioning=true;
    savedLastCategory=State.lastCategory;
    swipeTargetCategory=targetCategory||null;
    swipeCommitted=false;
  }

  function updateSwipe(progress,direction){
    var p=Math.min(progress,1);
    var sign=direction==="down"?1:-1;

    if(p<0.5){
      // İlk yarı: eski içerik fade-out
      DOM.contentBlock.style.opacity=String(1-p*2);
      DOM.contentBlock.style.transform="translate3d(0,"+(sign*p*20)+"px,0)";
    }else{
      // p>=0.5: rebuild yap (opacity zaten ~0)
      if(!swipeCommitted){
        swipeCommitted=true;
        DOM.contentBlock.style.opacity="0";
        applyNewState(direction);
      }
      // İkinci yarı: yeni içerik fade-in
      var inP=(p-0.5)/0.5;
      DOM.contentBlock.style.opacity=String(inP);
      DOM.contentBlock.style.transform="translate3d(0,"+(-sign*(1-inP)*10)+"px,0)";
    }
  }

  function endSwipe(commit,direction){
    if(commit){
      if(!swipeCommitted){
        swipeCommitted=true;
        DOM.contentBlock.style.opacity="0";
        applyNewState(direction);
      }
      var bOp=DOM.contentBlock.style.opacity||"0";
      var bTr=DOM.contentBlock.style.transform||"none";
      var bA=DOM.contentBlock.animate([
        {opacity:bOp,transform:bTr},
        {opacity:1,transform:"translate3d(0,0,0)"}
      ],{duration:150,easing:EASE});
      currentAnim=[bA];
      bA.onfinish=function(){cleanup();};
    }else{
      // İptal: state rebuild olduysa geri al
      if(swipeCommitted){
        revertState(direction);
      }
      var bOp=DOM.contentBlock.style.opacity||"1";
      var bTr=DOM.contentBlock.style.transform||"none";
      var bA=DOM.contentBlock.animate([
        {opacity:bOp,transform:bTr},
        {opacity:1,transform:"translate3d(0,0,0)"}
      ],{duration:180,easing:EASE});
      currentAnim=[bA];
      bA.onfinish=function(){cleanup();};
    }
  }

  // ── Geçersiz swipe: yay bounce ──
  function bounceInvalid(direction){
    var sign=direction==="up"?-1:1;
    DOM.rowContainer.animate([
      {transform:"translateY(0)"},
      {transform:"translateY("+(sign*15)+"px)"},
      {transform:"translateY(0)"}
    ],{duration:400,easing:"cubic-bezier(.25,1.05,.5,.98)"});
  }

  return {
    goToTasks:function(cat){animateTransition("up",cat);},
    goToCategories:function(){animateTransition("down");},
    startSwipe:startSwipe,
    updateSwipe:updateSwipe,
    endSwipe:endSwipe,
    bounceInvalid:bounceInvalid,
    cleanup:cleanup,
    isTransitioning:function(){return transitioning;}
  };
})();


/* ═══════════════════════════════════════════
   GESTURES — Unified touch+mouse: pull-to-add, scroll, vertical swipe
   ═══════════════════════════════════════════ */
var Gestures=(function(){
  /*
   * Gesture state (g) fields:
   *   active           - gesture tracking is in progress
   *   pulling          - pull-to-add mode engaged
   *   startX/startY    - initial touch/mouse position
   *   lastX            - previous frame X (for delta calc)
   *   axis             - detected axis: "x" | "y" | null
   *   dy               - cumulative vertical delta (for swipe)
   *   swiping          - vertical view-switch swipe in progress
   *   direction        - swipe direction: "up" | "down"
   *   pullVal          - current damped pull distance
   *   scrollStart      - scrollLeft at gesture start
   *   fromNewCardInput - gesture started on blank card's input
   *   overscroll       - edge overscroll amount (bounce effect)
   *   mouse            - true if mouse (not touch) gesture
   */
  var g={active:false};
  var momentumRAF=null;
  var bounceAnim=null;

  // ── Pull-to-add helpers ──
  function dampedPull(rawDx){
    var l=rawDx*0.55;
    return l<=Config.PULL_MAX?l:Config.PULL_MAX+(l-Config.PULL_MAX)*0.15;
  }

  function updateIndicator(pullVal){
    var el=DOM.pullIndicator;
    var p=Math.min(pullVal/Config.PULL_THRESHOLD,1);
    var on=p>.85;
    var s=.3+p*.7;
    el.style.opacity=String(Math.min(p*1.5,1));
    el.style.transform="translateX("+Math.min(pullVal-56,4)+"px) scale("+s+")";
    var icon=el.querySelector(".pull-icon");
    if(icon){
      icon.style.transform="rotate("+p*90+"deg)";
      icon.style.color=on?"#A78BFA":"rgba(255,255,255,.5)";
    }
    el.style.borderColor=on?"rgba(167,139,250,.6)":"rgba(255,255,255,.15)";
    el.style.background=on?"rgba(124,58,237,.25)":"rgba(255,255,255,.05)";
  }

  function resetVisuals(){
    var cur=DOM.row2Track.style.transform;
    DOM.row2Track.style.transition="none";
    DOM.row2Track.style.transform="";
    if(cur&&cur!=="none"){
      DOM.row2Track.animate([
        {transform:cur},{transform:"translateX(0)"}
      ],{duration:300,easing:"cubic-bezier(.25,1,.5,1)"});
    }
    DOM.pullIndicator.style.opacity="0";
    DOM.pullIndicator.style.transform="translateX(-56px) scale(.3)";
  }

  function commitPull(pullVal){
    DOM.proxyInput.focus({preventScroll:true}); /* gesture zincirinde senkron focus */
    // Ardışık ekleme: zaten bir blank card varsa, önce onu onayla
    if(State.adding){
      var continued=TodoManager.confirmAndContinue(pullVal);
      resetVisuals();
      if(!continued){
        // Boş text → iptal et, yeni kart açma
        TodoManager.cancel();
      }
      return;
    }
    TodoManager.add(pullVal);
    resetVisuals();
  }

  function applyPull(dx){
    g.pullVal=dampedPull(Math.max(0,dx));
    DOM.row2Track.style.transform="translateX("+g.pullVal+"px)";
    DOM.row2Track.style.transition="none";
    updateIndicator(g.pullVal);
  }

  function isInteractive(target){
    return target.closest("button")||target.closest("input");
  }

  // ── Çapraz koruma: axis detection ──
  function detectAxis(dx,dy){
    var adx=Math.abs(dx),ady=Math.abs(dy);
    if(adx<Config.AXIS_THRESHOLD&&ady<Config.AXIS_THRESHOLD)return null;
    if(adx>ady*Config.AXIS_RATIO)return "x";
    if(ady>adx*Config.AXIS_RATIO)return "y";
    // Çapraz ama yeterli hareket varsa dominant ekseni seç
    if(adx+ady>10)return adx>=ady?"x":"y";
    return null;
  }

  // ── Momentum: rAF tabanlı, frame-rate bağımsız ──
  function cancelBounce(){
    if(bounceAnim){try{bounceAnim.cancel();}catch(e){}bounceAnim=null;}
    DOM.row2Track.style.transform="";
  }

  function bounce(overscrollPx){
    cancelBounce();
    bounceAnim=DOM.row2Track.animate([
      {transform:"translateX("+overscrollPx+"px)"},
      {transform:"translateX(0)"}
    ],{duration:480,easing:"cubic-bezier(.25,1.05,.5,.98)"});
    bounceAnim.onfinish=function(){bounceAnim=null;};
    RowManager.bounce(overscrollPx);
  }

  function cancelMomentum(){
    if(momentumRAF){
      cancelAnimationFrame(momentumRAF);momentumRAF=null;
    }
  }

  function startMomentum(vel){
    cancelMomentum();
    var sc=DOM.row2Scroll;
    var lastT=performance.now();
    function step(now){
      var dt=now-lastT;lastT=now;
      vel*=Math.pow(Config.MOMENTUM_FRICTION,dt/16.67);

      // Edge damping: gentle friction near scroll boundaries
      var maxSc=sc.scrollWidth-sc.clientWidth;
      var edgeDist=Math.min(sc.scrollLeft,maxSc-sc.scrollLeft);
      if(edgeDist<80){
        var edgeFactor=Math.max(0,edgeDist/80);
        vel*=0.78+0.22*edgeFactor; // 78% retention at edge → 100% at 80px away
      }

      if(Math.abs(vel)<Config.MOMENTUM_MIN){momentumRAF=null;return;}
      sc.scrollLeft-=vel;RowManager.syncScroll(sc.scrollLeft);
      if((sc.scrollLeft<=0&&vel>0)||(sc.scrollLeft>=maxSc&&vel<0)){
        momentumRAF=null;
        var over=vel*6;
        over=Math.sign(over)*Math.min(Math.abs(over),42);
        if(Math.abs(over)<8)over=Math.sign(over||1)*8; // minimum bounce for feel
        bounce(over);
        return;
      }
      momentumRAF=requestAnimationFrame(step);
    }
    momentumRAF=requestAnimationFrame(step);
  }

  // ── Velocity tracker: ring buffer, 0 GC ──
  function createVelocityTracker(){
    var xs=new Float64Array(8),ts=new Float64Array(8);
    var head=0,count=0;
    return {
      add:function(x){
        xs[head]=x;ts[head]=performance.now();
        head=(head+1)&7;
        if(count<8)count++;
      },
      get:function(){
        if(count<2)return 0;
        var newest=(head-1+8)&7;
        if(performance.now()-ts[newest]>200)return 0;
        var oldest=-1,oi=0;
        for(var i=1;i<count;i++){
          var idx=(head-1-i+8)&7;
          if(ts[newest]-ts[idx]>100)break;
          oldest=idx;oi=i;
        }
        if(oi<1)return 0;
        var dt=ts[newest]-ts[oldest];
        if(dt<1)return 0;
        return(xs[newest]-xs[oldest])/dt*16.67;
      },
      reset:function(){head=0;count=0;}
    };
  }

  // ── INIT: unified touch+mouse handler setup ──
  function init(){
    var appContainer=DOM.appContainer;
    var scrollEl=DOM.row2Scroll;
    var velocity=createVelocityTracker();

    // ── Helper: capture horizontal swipe from blank card input ──
    function handleNewCardInputSwipe(dx,dy){
      if(!g.axis){
        g.axis=detectAxis(dx,dy);
        if(!g.axis)return "pending";
        if(g.axis==="x"){
          var nc=DOM.queryNewCard();
          if(nc&&nc._markSubmitted)nc._markSubmitted();
          if(nc&&nc._blankInput)nc._blankInput.blur();
          g.fromNewCardInput=false;
          return "captured";
        }
        g.active=false;
        return "released";
      }
      return g.axis?"captured":"pending";
    }

    // ── TOUCH ──
    appContainer.addEventListener("touchstart",function(e){
      var fromNewCardInput=State.adding&&e.target.closest(".new-card")&&isInteractive(e.target);
      if(!fromNewCardInput&&isInteractive(e.target)&&!e.target.closest("#addBtn"))return;
      cancelMomentum();cancelBounce();
      var t=e.touches[0];
      g={active:true,pulling:false,startX:t.clientX,startY:t.clientY,lastX:t.clientX,
         axis:null,dy:0,swiping:false,direction:null,pullVal:0,scrollStart:scrollEl.scrollLeft,
         fromNewCardInput:!!fromNewCardInput};
      velocity.reset();
      velocity.add(t.clientX);
    },{passive:true});

    appContainer.addEventListener("touchmove",function(e){
      if(!g.active)return;
      var t=e.touches[0];
      var dx=t.clientX-g.startX;
      var dy=t.clientY-g.startY;

      // Blank card input → only capture horizontal swipes
      if(g.fromNewCardInput){
        var result=handleNewCardInputSwipe(dx,dy);
        if(result!=="captured")return;
      }

      if(!g.axis){
        g.axis=detectAxis(dx,dy);
        if(!g.axis){
          e.preventDefault();
          velocity.add(t.clientX);
          scrollEl.scrollLeft-=(t.clientX-g.lastX);RowManager.syncScroll(scrollEl.scrollLeft);
          g.lastX=t.clientX;
          return;
        }
        if(g.axis==="y")scrollEl.scrollLeft=g.scrollStart;
      }

      // ── HORIZONTAL: scroll or pull-to-add ──
      if(g.axis==="x"){
        e.preventDefault();
        velocity.add(t.clientX);
        var frameDx=t.clientX-g.lastX;
        g.lastX=t.clientX;

        if(!g.pulling&&g.scrollStart<2&&scrollEl.scrollLeft<2&&dx>4)g.pulling=true;

        if(g.pulling){
          applyPull(dx);
        }else{
          var before=scrollEl.scrollLeft;
          scrollEl.scrollLeft-=frameDx;RowManager.syncScroll(scrollEl.scrollLeft);
          var clamped=scrollEl.scrollLeft===before&&frameDx!==0;
          if(clamped){
            g.overscroll=(g.overscroll||0)+frameDx*0.5;
            g.overscroll=Math.sign(g.overscroll)*Math.min(Math.abs(g.overscroll),50);
            DOM.row2Track.style.transform="translateX("+g.overscroll+"px)";
          }else if(g.overscroll){
            g.overscroll=0;
            DOM.row2Track.style.transform="";
          }
        }
        return;
      }

      // ── VERTICAL: category↔task view switch ──
      e.preventDefault();
      g.dy=dy;

      if(State.adding||Navigation.isTransitioning())return;

      if(!g.swiping&&Math.abs(dy)>15){
        var dir=dy>0?"down":"up";
        var canSwipe=false;
        var swipeCat=null;
        if(dir==="down"&&State.view==="tasks"){
          canSwipe=true;
        }else if(dir==="up"&&State.view==="categories"){
          // Parmak pozisyonundaki kategoriyi bul
          var relX=t.clientX+scrollEl.scrollLeft-20;
          var catIdx=Math.max(0,Math.min(Math.floor(relX/Config.SLOT),State.categories.length-1));
          var cat=State.categories[catIdx];
          if(cat){canSwipe=true;swipeCat=cat;}
        }
        if(canSwipe){
          g.swiping=true;g.direction=dir;Navigation.startSwipe(dir,swipeCat);
        }else{
          // Geçersiz yönde swipe: bounce efekti
          g.swiping=true;g.direction=dir;g.invalidSwipe=true;
          Navigation.bounceInvalid(dir);
        }
      }

      if(g.swiping&&!g.invalidSwipe){
        var progress=Math.min(Math.abs(dy)/200,1);
        Navigation.updateSwipe(progress,g.direction);
      }
    },{passive:false});

    appContainer.addEventListener("touchend",function(){
      if(!g.active)return;

      // Horizontal finalize
      if(g.axis==="x"||!g.axis){
        if(g.axis==="x"&&g.pulling&&(g.pullVal||0)>Config.PULL_THRESHOLD){
          commitPull(g.pullVal||0);
        }else if(g.axis==="x"&&g.pulling){
          resetVisuals();
        }else{
          if(g.overscroll&&Math.abs(g.overscroll)>2){
            bounce(g.overscroll);
          }else{
            var v=velocity.get();
            if(Math.abs(v)>Config.MOMENTUM_MIN)startMomentum(v);
          }
        }
      }

      // Vertical finalize
      if(g.swiping&&!g.invalidSwipe){
        var progress=Math.min(Math.abs(g.dy)/200,1);
        Navigation.endSwipe(progress>0.2,g.direction);
      }

      g={active:false};
    },{passive:true});

    appContainer.addEventListener("touchcancel",function(){
      if(g.pulling)resetVisuals();
      if(g.swiping&&!g.invalidSwipe)Navigation.endSwipe(false,g.direction);
      g={active:false};
    },{passive:true});

    // ── MOUSE ──
    appContainer.addEventListener("mousedown",function(e){
      var fromNewCardInput=State.adding&&e.target.closest(".new-card")&&isInteractive(e.target);
      if(!fromNewCardInput&&isInteractive(e.target)&&!e.target.closest("#addBtn"))return;
      cancelMomentum();cancelBounce();
      g={active:true,pulling:false,startX:e.clientX,startY:e.clientY,lastX:e.clientX,
         axis:null,mouse:true,pullVal:0,scrollStart:scrollEl.scrollLeft,
         fromNewCardInput:!!fromNewCardInput};
      velocity.reset();
      velocity.add(e.clientX);
      if(!fromNewCardInput)e.preventDefault();
    });

    window.addEventListener("mousemove",function(e){
      if(!g.active||!g.mouse)return;
      var dx=e.clientX-g.startX;
      var dy=e.clientY-g.startY;

      // Blank card input → only capture horizontal swipes
      if(g.fromNewCardInput){
        var result=handleNewCardInputSwipe(dx,dy);
        if(result==="captured")e.preventDefault();
        if(result!=="captured")return;
      }

      if(!g.axis){
        g.axis=detectAxis(dx,dy);
        if(!g.axis)return;
      }
      if(g.axis!=="x")return;

      velocity.add(e.clientX);
      var frameDx=e.clientX-g.lastX;
      g.lastX=e.clientX;

      if(!g.pulling&&g.scrollStart<2&&scrollEl.scrollLeft<2&&dx>4)g.pulling=true;

      if(g.pulling){applyPull(dx);}
      else{
        var before=scrollEl.scrollLeft;
        scrollEl.scrollLeft-=frameDx;RowManager.syncScroll(scrollEl.scrollLeft);
        var clamped=scrollEl.scrollLeft===before&&frameDx!==0;
        if(clamped){
          g.overscroll=(g.overscroll||0)+frameDx*0.5;
          g.overscroll=Math.sign(g.overscroll)*Math.min(Math.abs(g.overscroll),80);
          DOM.row2Track.style.transform="translateX("+g.overscroll+"px)";
        }else if(g.overscroll){
          g.overscroll=0;
          DOM.row2Track.style.transform="";
        }
      }
    });

    window.addEventListener("mouseup",function(){
      if(!g.active||!g.mouse)return;
      if(g.pulling&&(g.pullVal||0)>Config.PULL_THRESHOLD){
        commitPull(g.pullVal||0);
      }else if(g.pulling){
        resetVisuals();
      }else if(g.overscroll&&Math.abs(g.overscroll)>2){
        bounce(g.overscroll);
      }else{
        var v=velocity.get();
        if(Math.abs(v)>Config.MOMENTUM_MIN)startMomentum(v);
      }
      g={active:false};
    });

    // + button
    DOM.addBtn.addEventListener("click",function(){DOM.proxyInput.focus({preventScroll:true});TodoManager.add();});
  }

  return {init:init};
})();


/* ═══════════════════════════════════════════
   INIT — Bootstrap
   ═══════════════════════════════════════════ */
Layout.init();
Gestures.init();
UI.renderAll();

})();
</script>
</body>
